<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AndrewInUA Validator Dashboard</title>
  <style>
    :root {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #050816;
      color: #e6eaf2;
      overflow-x: hidden;
    }

    body { min-height: 100vh; }

    .wrap {
      max-width: 1180px;
      margin: 34px auto;
      padding: 0 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .lead {
      margin: 0 0 28px;
      font-size: 15px;
      line-height: 1.6;
      color: #9fb0ce;
      max-width: 940px;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 980px) {
      .grid {
        grid-template-columns: 1fr 1.08fr;
      }
    }

    .span-2 { grid-column: 1 / -1; }

    .card {
      background: linear-gradient(180deg, #121827 0%, #10172a 100%);
      border: 1px solid #1f2a44;
      border-radius: 20px;
      padding: 20px 20px 18px;
      overflow: hidden;
      min-width: 0;
    }

    .title {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 700;
      word-break: break-word;
    }

    .subtext {
      margin: 0;
      font-size: 13px;
      line-height: 1.65;
      color: #9fb0ce;
      max-width: 860px;
      overflow-wrap: anywhere;
    }

    .muted {
      color: #9fb0ce;
      font-size: 14px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .small { font-size: 12px; }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .kpi-row {
      margin-top: 16px;
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .kpi-block {
      min-width: 0;
      flex: 0 1 auto;
    }

    .kpi {
      font-size: 30px;
      line-height: 1.08;
      font-weight: 800;
      word-break: break-word;
    }

    .badge,
    .source-chip,
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      font-size: 12px;
      line-height: 1.35;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #2a3561;
      background: #0b1022;
      color: #cbd5e1;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .badge { background: #1a2240; }

    .ok {
      background: #0f3a2b;
      border-color: #1f6c51;
    }

    .warn {
      background: #40221a;
      border-color: #61352a;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      padding: 5px 14px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 22px;
      line-height: 1.2;
      white-space: normal;
      text-align: center;
      overflow-wrap: anywhere;
      background: #0f3a2b;
      border: 1px solid #1f6c51;
    }

    .source-label {
      margin-top: 14px;
      color: #8ea1c4;
      font-size: 12px;
      line-height: 1.45;
    }

    .source-row,
    .pill-row,
    .pool-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      min-width: 0;
    }

    .last-updated {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.5;
      color: #97a4c6;
      overflow-wrap: anywhere;
    }

    .behavior-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 16px;
    }

    @media (min-width: 980px) {
      .behavior-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .behavior-item {
      background: #0b1022;
      border: 1px solid #22304d;
      border-radius: 16px;
      padding: 16px 16px 14px;
      min-width: 0;
    }

    .behavior-label {
      color: #9fb0ce;
      font-size: 13px;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .behavior-value {
      margin-top: 10px;
      font-size: 26px;
      line-height: 1.1;
      font-weight: 800;
      word-break: break-word;
    }

    .behavior-sub {
      margin-top: 8px;
      color: #aebbd7;
      font-size: 13px;
      line-height: 1.6;
      max-width: 46ch;
      overflow-wrap: anywhere;
    }

    .share-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      min-width: 0;
      margin-top: 12px;
    }

    .share-input {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
      border-radius: 999px;
      border: 1px solid #283554;
      background: #020617;
      color: #e5e7eb;
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
    }

    .share-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px #0ea5e9;
    }

    .share-copy-btn {
      flex: 0 0 auto;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      min-height: 40px;
    }

    .share-copy-btn:hover { background: #1d4ed8; }

    .pool-badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      font-size: 12px;
      line-height: 1.35;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #2a3561;
      background: #0b1022;
      color: #cbd5e1;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .pill-ok {
      background: #0f3a2b;
      border-color: #1f6c51;
      color: #d7ffe9;
    }

    .pill-warn {
      background: #40221a;
      border-color: #61352a;
      color: #ffd7cf;
    }

    .info-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #1e293b;
      color: #9fb0ce;
      font-size: 11px;
      cursor: pointer;
      position: relative;
      margin-left: 4px;
      border: 1px solid #2a3561;
      flex: 0 0 auto;
      user-select: none;
    }

    .info-dot::after {
      content: none !important;
      display: none !important;
    }

    .mobile-tooltip {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #243046;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
      box-shadow: 0 18px 45px rgba(0,0,0,.55);
      z-index: 9999;
      display: none;
    }

    .mobile-tooltip.show { display: block; }

    .mobile-tooltip-close {
      margin-top: 10px;
      display: inline-block;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .tooltip-hint {
      font-size: 11px;
      opacity: .8;
      margin-top: 6px;
    }

    .footer {
      margin-top: 22px;
      font-size: 13px;
      line-height: 1.65;
      color: #93a6c8;
      overflow-wrap: anywhere;
    }

    .footer strong { color: #c7d2fe; }

    a {
      color: #8bd5ff;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    a:hover { text-decoration: underline; }

    code {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

        margin: 18px auto;
        padding:
